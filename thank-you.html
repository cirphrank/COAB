<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — The Dojo</title>
  <meta name="description" content="Thanks for subscribing to The Dojo." />
  <style>
    :root {
      --blue:#5876a8;
      --blue-deep:#445f8f;
      --ink:#122238;
      --gray:#66758a;
      --bg:#f8fbff;
      --card:#ffffff;
      --line:#dbe5f1;
      --shadow:0 22px 54px rgba(33,56,94,.08);
      --heading:'Cormorant Garamond', Georgia, serif;
      --body:'Inter', system-ui, sans-serif;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:var(--body);
      color:var(--ink);
      background:linear-gradient(180deg, #f7faff 0%, #eef4fb 100%);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:2rem;
    }
    .card {
      width:min(100%, 720px);
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:clamp(2rem, 5vw, 4rem);
      text-align:center;
    }
    .tag {
      display:inline-flex;
      align-items:center;
      gap:.55rem;
      background:rgba(88,118,168,.08);
      border:1px solid rgba(88,118,168,.16);
      color:var(--blue-deep);
      padding:.55rem 1rem;
      border-radius:999px;
      font-size:.77rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:1.4rem;
    }
    .title {
      font-family:var(--heading);
      font-size:clamp(2.4rem, 5vw, 4rem);
      line-height:1;
      margin:0 0 1rem;
    }
    .text {
      color:var(--gray);
      font-size:1.02rem;
      line-height:1.9;
      max-width:52ch;
      margin:0 auto 2rem;
    }
    .btns {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:.9rem;
    }
    a.btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:1rem 1.55rem;
      border-radius:999px;
      text-decoration:none;
      font-weight:800;
      transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
    }
    a.btn:hover { transform:translateY(-2px); }
    .primary {
      background:linear-gradient(135deg, var(--blue), var(--blue-deep));
      color:#fff;
      box-shadow:0 14px 30px rgba(68,95,143,.15);
    }
    .secondary {
      background:#fff;
      color:var(--ink);
      border:1.5px solid rgba(88,118,168,.16);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Subscribed</div>
    <h1 class="title">Thank you for joining The Dojo.</h1>
    <p class="text">You’re on the list now. Expect creator updates, useful resources, and occasional strategy notes from The Dojo.</p>
    <div class="btns">
      <a class="btn primary" href="/">Back to homepage</a>
      <a class="btn secondary" href="mailto:thedojo@cirphrank.com">Contact us</a>
    </div>
  </main>
</body>
</html>
